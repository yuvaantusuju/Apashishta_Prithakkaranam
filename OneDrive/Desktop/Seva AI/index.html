<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kachara-vibhajanam</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Background layers -->
  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="leaf-strip"></div>

  <!-- Floating leaves -->
  <div class="leaves">
    <div class="leaf"><svg viewBox="0 0 24 24" fill="currentColor" width="100%"><path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/></svg></div>
    <div class="leaf"><svg viewBox="0 0 24 24" fill="currentColor" width="100%"><path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/></svg></div>
    <div class="leaf"><svg viewBox="0 0 24 24" fill="currentColor" width="100%"><path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/></svg></div>
    <div class="leaf"><svg viewBox="0 0 24 24" fill="currentColor" width="100%"><path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/></svg></div>
    <div class="leaf"><svg viewBox="0 0 24 24" fill="currentColor" width="100%"><path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/></svg></div>
    <div class="leaf"><svg viewBox="0 0 24 24" fill="currentColor" width="100%"><path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/></svg></div>
    <div class="leaf"><svg viewBox="0 0 24 24" fill="currentColor" width="100%"><path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/></svg></div>
    <div class="leaf"><svg viewBox="0 0 24 24" fill="currentColor" width="100%"><path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/></svg></div>
  </div>

  <!-- Main card -->
  <div class="page">
    <div class="card">

      <!-- Logo & title -->
   <div class="logo-wrap">
        <div class="logo-ring">
          <svg class="ring-svg" viewBox="0 0 72 72" fill="none">
            <circle cx="36" cy="36" r="33" stroke="#4a8c5c" stroke-width="1.5" stroke-dasharray="6 5" stroke-linecap="round"/>
          </svg>
          <div class="logo-inner">
            <img src="logo.png" alt="Kachara-vibhajanam logo" class="logo-img"/>
          </div>
        </div>
        <h1 class="title">Kachara-vibhajanam</h1>
        <p class="subtitle">Waste Segregation Platform</p>
      </div>

      <!-- Waste category pills -->
      <div class="waste-pills">
        <span class="pill pill--green"><span class="pill-dot"></span>Organic</span>
        <span class="pill pill--blue"><span class="pill-dot"></span>Recyclable</span>
        <span class="pill pill--amber"><span class="pill-dot"></span>Hazardous</span>
      </div>

      <!-- Description -->
      <p class="hero-desc">
        Join us in building a cleaner, greener tomorrow —<br/>
        one bin at a time.
      </p>

      <!-- CTA Button -->
      <button class="btn" id="beginBtn">
        <span class="btn-text">Let's Begin!</span>
        <span class="btn-leaf">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/>
          </svg>
        </span>
        <div class="btn-spinner"><div class="spinner"></div></div>
      </button>

      <!-- Eco tag -->
      <div class="eco-tag">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17 8C8 10 5.9 16.17 3.82 19.34 3.09 20.5 4 22 5.33 21.67A10 10 0 0 0 21 12C21 12 20 8 17 8Z"/></svg>
        Segregate · Sustain · Thrive
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
